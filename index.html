<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viranga Wettewa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
       
        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }
       
        .heading-font {
            font-family: 'Playfair Display', serif;
        }

        .hero-bg {
            background-image: linear-gradient(rgba(28, 25, 23, 0.45), rgba(28, 25, 23, 0.65)),
                              url('images/VirangaBGforwebsite.jpg');
            background-size: cover;
            background-position: center 55%;
            min-height: 100vh;
            background-attachment: scroll;
        }

        @media (min-width: 768px) {
            .hero-bg {
                background-position: center bottom;
                background-attachment: fixed;
            }
        }

        .content-image {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .content-image:hover {
            transform: scale(1.03);
        }

        .nav-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .luxury-button {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="tail-container bg-[#f8f4f0] text-[#1c1917] overflow-x-hidden">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-[#f8f4f0]/95 backdrop-blur-md border-b border-[#e5d9c8]">
        <div class="max-w-7xl mx-auto px-6 md:px-8 py-5 md:py-6 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-6 h-px bg-[#b38b5d]"></div>
                <span class="heading-font text-2xl tracking-tighter">Viranga Wettewa</span>
            </div>
           
            <div class="hidden md:flex items-center gap-x-10 text-sm tracking-widest font-medium">
                <a href="#home" class="nav-link">HOME</a>
                <a href="about.html" class="nav-link">JOURNAL</a>
                <a href="#values" class="nav-link">VALUES</a>
                <a href="#contact" class="nav-link">CONNECT</a>
            </div>
           
            <button onclick="toggleContact()" 
                    class="px-6 md:px-8 py-3.5 text-sm tracking-widest border border-[#b38b5d] hover:bg-[#b38b5d] hover:text-[#f8f4f0] transition-all">
                LET'S CONNECT
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section id="home" class="hero-bg flex items-center text-white relative">
        <div class="max-w-4xl mx-auto px-6 md:px-8 text-center pt-20 md:pt-0">
        
        
            <p class="max-w-md mx-auto text-base md:text-lg opacity-90 mb-12">
                A quiet pursuit of quality, culture, and meaningful experiences.
            </p>
           
            <div class="flex flex-col sm:flex-row gap-4 md:gap-6 justify-center">
                <a href="about.html" 
                   class="luxury-button block md:inline-block px-8 md:px-10 py-5 md:py-6 bg-transparent border-2 border-white text-white text-sm tracking-widest hover:bg-white hover:text-[#1c1917]">
                    EXPLORE MY WORLD
                </a>
                <a href="#contact" onclick="toggleContact()" 
                   class="luxury-button block md:inline-block px-8 md:px-10 py-5 md:py-6 bg-white text-[#1c1917] text-sm tracking-widest">
                    BEGIN A CONVERSATION
                </a>
            </div>
        </div>
    </section>

  

    <!-- CONTACT (same as before) -->
    <section id="contact" class="py-20 md:py-28 bg-[#1c1917] text-[#f8f4f0]">
        <!-- ... your contact form ... -->
    </section>

    <script>
        function toggleContact() {
            document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
